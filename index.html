<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>혼자ON 생활 지원</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#app">본문으로 건너뛰기</a>
  <div class="site-shell">
    <section class="intro-screen" id="personaSection" aria-labelledby="personaTitle">
      <div class="intro-topbar">
        <strong>혼자ON</strong>
        <button class="text-link" data-go-view="roadmap">서비스 구조</button>
      </div>
      <div class="intro-copy">
        <span class="eyebrow">Live Demo</span>
        <h1 id="personaTitle">오늘 시연할 사용자를 선택하세요</h1>
        <p>페르소나를 고르면 맞춤 미션 보드가 열리고, 각 미션을 누르며 기능 흐름을 바로 보여줄 수 있습니다.</p>
      </div>
      <div class="persona-grid" id="personaGrid"></div>
      <div class="demo-hint">
        <span>시연 흐름</span>
        <strong>선택 → 미션 카드 → 실행 화면 → 활동 이력</strong>
      </div>
    </section>

    <nav class="app-nav" id="appNav" aria-label="앱 주요 화면"></nav>

    <main id="app" tabindex="-1"></main>

    <footer class="site-footer">
      <div>
        <strong>혼자ON</strong>
        <p>생활 체크·도움 요청·안전 기록을 한곳에서 관리</p>
      </div>
      <div class="footer-links">
        <span>권장 사용: Chrome / Edge</span>
        <span>개인 정보는 이 브라우저에만 임시 저장</span>
      </div>
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
